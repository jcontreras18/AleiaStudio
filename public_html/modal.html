<div id="modalContacto" class="modal">

  <div class="modal-contenido">

    <!-- BOTÓN CERRAR -->
    <span class="cerrar-modal">&times;</span>

    <!-- CONTENIDO -->
    <h2>Contáctanos</h2>
    <p>Déjanos tus datos y te responderemos pronto</p>

    <!-- FORMULARIO -->
    <form id="formContacto">

      <input type="text" placeholder="Nombre completo" required>

      <input type="email" placeholder="Correo electrónico" required>

      <input type="tel" placeholder="Teléfono">

      <textarea placeholder="Escribe tu mensaje..." rows="4"></textarea>

      <button type="submit">Enviar mensaje</button>

    </form>

  </div>

</div>


<!-- ===================== -->
<!-- ESTILOS DEL MODAL -->
<!-- ===================== -->
<style>

.modal{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);

  display: none;
  align-items: center;
  justify-content: center;

  z-index: 9999;

  padding: 20px;
}

.modal-contenido{
  background: #111;
  color: #fff;

  width: 100%;
  max-width: 420px;

  padding: 25px 20px;
  border-radius: 15px;

  position: relative;

  animation: aparecer 0.3s ease;
}

@keyframes aparecer{
  from{
    opacity: 0;
    transform: scale(0.9);
  }
  to{
    opacity: 1;
    transform: scale(1);
  }
}

/* BOTÓN CERRAR */
.cerrar-modal{
  position: absolute;
  top: 10px;
  right: 15px;

  font-size: 26px;
  cursor: pointer;
}

/* TEXTO */
.modal h2{
  margin-bottom: 5px;
}

.modal p{
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 15px;
}

/* FORM */
.modal input,
.modal textarea{
  width: 100%;
  margin-top: 10px;
  padding: 12px;

  border: none;
  border-radius: 8px;

  background: #1a1a1a;
  color: #fff;
}

.modal input::placeholder,
.modal textarea::placeholder{
  color: #aaa;
}

/* BOTÓN */
.modal button{
  width: 100%;
  margin-top: 15px;
  padding: 12px;

  border: none;
  border-radius: 8px;

  background: #ff6600;
  color: #fff;

  font-weight: bold;
  cursor: pointer;

  transition: 0.3s;
}

.modal button:hover{
  background: #ff8533;
}

/* RESPONSIVE */
@media (max-width: 480px){
  .modal-contenido{
    padding: 20px 15px;
  }
}

</style>


<!-- ===================== -->
<!-- SCRIPT OPCIONAL -->
<!-- ===================== -->
<script>

// evitar recarga del form (demo)
document.addEventListener("submit", function(e){
  if(e.target.id === "formContacto"){
    e.preventDefault();
    alert("Mensaje enviado 🚀");
  }
});

</script>
