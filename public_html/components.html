<!-- Sección Contáctanos -->
<section id="contacto" class="contact-section bg-dark text-light py-5 wow fadeIn">
    <div class="container">
        <div class="row justify-content-center mb-4">
            <div class="col-md-8 text-center">
                <h2 class="mb-3">Contáctanos</h2>
                <p>Estamos listos para ayudarte. Completa el formulario y nos pondremos en contacto contigo.</p>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <form id="contactForm" class="needs-validation" novalidate>
                    <div class="form-row">
                        <div class="form-group col-md-6 mb-3">
                            <label for="name">Nombre</label>
                            <input type="text" class="form-control" id="name" placeholder="Tu nombre" required>
                            <div class="invalid-feedback">Por favor ingresa tu nombre.</div>
                        </div>
                        <div class="form-group col-md-6 mb-3">
                            <label for="email">Correo</label>
                            <input type="email" class="form-control" id="email" placeholder="Tu correo" required>
                            <div class="invalid-feedback">Por favor ingresa un correo válido.</div>
                        </div>
                    </div>
                    <div class="form-group mb-3">
                        <label for="phone">Teléfono</label>
                        <input type="tel" class="form-control" id="phone" placeholder="Tu teléfono">
                    </div>
                    <div class="form-group mb-3">
                        <label for="message">Mensaje</label>
                        <textarea class="form-control" id="message" rows="5" placeholder="Escribe tu mensaje" required></textarea>
                        <div class="invalid-feedback">Por favor ingresa un mensaje.</div>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary px-5">Enviar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>

<script>
// Validación básica del formulario Bootstrap
(function() {
  'use strict';
  window.addEventListener('load', function() {
    var form = document.getElementById('contactForm');
    form.addEventListener('submit', function(event) {
      if (form.checkValidity() === false) {
        event.preventDefault();
        event.stopPropagation();
      } else {
        // Aquí podrías enviar el formulario con AJAX si quieres
        alert('Gracias por contactarnos, responderemos pronto.');
        form.reset();
        event.preventDefault(); // Quitar si usas envío real
      }
      form.classList.add('was-validated');
    }, false);
  }, false);
})();
</script>
